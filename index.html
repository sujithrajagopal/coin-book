/* ---- subtle motion ---- */
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes slipup{from{transform:translateY(115%);opacity:.6}to{transform:none;opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.25);filter:brightness(1.35)}}
@keyframes breathe{0%,100%{opacity:1}50%{opacity:.78}}

.rise{animation:rise .28s ease both}
.slipup{animation:slipup .32s cubic-bezier(.2,.8,.3,1) both}
.pulse{animation:pulse 2.4s ease-in-out infinite}
.breathe{animation:breathe 2.8s ease-in-out infinite}
.fabring{animation:fabring 2.6s ease-out infinite}
.spin{animation:spin 1.6s linear infinite;display:inline-block}
button{transition:transform .12s ease,opacity .15s ease,background .2s ease}
button:active{transform:scale(.96)}
@media (prefers-reduced-motion: reduce){.rise,.slipup,.pulse,.breathe,.fabring,.spin{animation:none}button{transition:none}}
